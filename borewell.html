<!DOCTYPE html>
<html>
<head>

<title>Borewell Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<link rel="stylesheet" href="style.css">

<style>

.deviceCard{
margin-bottom:15px;
}

.status{
margin-top:10px;
margin-bottom:10px;
font-weight:600;
}

.btnRow{
display:flex;
gap:10px;
margin-top:10px;
}

.online{
color:#16a34a;
}

.offline{
color:#dc2626;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
BOREWELL CONTROL
</div>

<div class="nav" onclick="goHome()">
🏠 Dashboard
</div>

<div class="nav" onclick="logout()">
🚪 Logout
</div>

</div>

<!-- MAIN -->

<div class="main">

<h2>My Borewells</h2>

<br>

<div id="borewellContainer">

<div class="card">
Loading Borewells...
</div>

</div>

</div>

</div>

<script>

let currentUid = null;

/* ================= AUTH ================= */

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location.href="index.html";
return;

}

currentUid = user.uid;

loadBorewells();

});

/* ================= LOAD ================= */

function loadBorewells(){

firebase.database()
.ref("devices/"+currentUid+"/borewells")
.on("value",snap=>{

let borewells = snap.val();

if(!borewells){

document.getElementById(
"borewellContainer"
).innerHTML =

'<div class="card">No Borewells Assigned</div>';

return;

}

let html = "";

for(let bw in borewells){

let status =
borewells[bw].status || 0;

html += `

<div class="card deviceCard">

<h3>${borewells[bw].name}</h3>

<div class="status">

Status :

<span class="${
status ? 'online' : 'offline'
}">

${status ? 'RUNNING' : 'STOPPED'}

</span>

</div>

<div class="btnRow">

<button
class="success"
onclick="startBorewell('${bw}')">

ON

</button>

<button
class="danger"
onclick="stopBorewell('${bw}')">

OFF

</button>

</div>

</div>

`;

}

document.getElementById(
"borewellContainer"
).innerHTML = html;

});

}

/* ================= START ================= */

async function startBorewell(bw){

let borewellSnap =
await firebase.database()
.ref(
"devices/"+currentUid+
"/borewells/"+bw
)
.once("value");

let borewell =
borewellSnap.val();

if(!borewell){

alert("Borewell not found");
return;

}

let mappedValves =
borewell.valves || {};

let valveIds =
Object.keys(mappedValves);

if(valveIds.length === 0){

alert(
"⚠ No valves mapped to this borewell."
);

return;

}

let valveOn = false;

for(let valveId of valveIds){

let valveSnap =
await firebase.database()
.ref(
"devices/"+currentUid+
"/valves/"+valveId
)
.once("value");

let valve =
valveSnap.val();

if(
valve &&
valve.status === 1
){

valveOn = true;
break;

}

}

if(!valveOn){

alert(
"⚠ WARNING\n\nAll valves assigned to this borewell are OFF.\n\nTurn ON at least one valve before starting the borewell."
);

return;

}

await firebase.database()
.ref(
"devices/"+currentUid+
"/borewells/"+bw+"/status"
)
.set(1);

}

/* ================= STOP ================= */

async function stopBorewell(bw){

await firebase.database()
.ref(
"devices/"+currentUid+
"/borewells/"+bw+"/status"
)
.set(0);

}

/* ================= NAVIGATION ================= */

function goHome(){

window.location.href =
"home.html";

}

function logout(){

firebase.auth()
.signOut()
.then(()=>{

window.location.href =
"index.html";

});

}

</script>

</body>
</html>
