<!DOCTYPE html>
<html>
<head>
<title>Relay Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#111827,#0f172a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.panel{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
width:400px;
text-align:center;
backdrop-filter:blur(10px);
}

button{
padding:15px;
margin:10px;
width:120px;
border:none;
border-radius:10px;
cursor:pointer;
}

.on{background:#22c55e;}
.off{background:#ef4444;}
.back{background:#64748b;width:100%;}

.status{
margin:20px;
padding:10px;
background:#1f2937;
border-radius:10px;
}

</style>

</head>

<body>

<div class="panel">

<h2>Relay Control Panel</h2>

<div id="status" class="status">OFF</div>

<button class="on" onclick="on()">ON</button>
<button class="off" onclick="off()">OFF</button>

<button class="back" onclick="back()">Back</button>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}
});

function on(){
firebase.database().ref("relay").set(1);
document.getElementById("status").innerText="ON";
}

function off(){
firebase.database().ref("relay").set(0);
document.getElementById("status").innerText="OFF";
}

function back(){
window.location.href="home.html";
}

</script>

</body>
</html>
