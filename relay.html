<!DOCTYPE html>
<html>
<head>
<title>Relay Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">⚡ IoT CONTROL</div>
<div class="nav" onclick="back()">⬅ Back</div>
</div>

<div class="main">

<h2>Relay Device Control</h2>

<div class="card">

<h3>Status: <span id="statusText">OFF</span></h3>

<br>

<button class="on" onclick="on()">TURN ON</button>
<button class="off" onclick="off()">TURN OFF</button>

</div>

</div>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{
if(!user) window.location.href="index.html";
});

firebase.database().ref("relay").on("value",snap=>{
document.getElementById("statusText").innerText =
snap.val()==1 ? "ON" : "OFF";
});

function on(){
firebase.database().ref("relay").set(1);
}

function off(){
firebase.database().ref("relay").set(0);
}

function back(){
window.location.href="home.html";
}

</script>

</body>
</html>
