<!DOCTYPE html>
<html>
<head>

<title>IoT Smart Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:20px;
}

h2{
margin-bottom:5px;
}

.section{
margin-top:20px;
padding:15px;
background:#1f1f1f;
border-radius:10px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:8px 0;
background:#2a2a2a;
border-radius:8px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.on{background:#16a34a;color:#fff;}
.off{background:#dc2626;color:#fff;}

.warn{
background:#facc15;
color:#000;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:none;
}

</style>

</head>

<body>

<h2>⚙ IoT Control Dashboard</h2>

<div id="userInfo">Loading...</div>

<div id="warning" class="warn"></div>

<div class="section">
<h3>🚰 Valves</h3>
<div id="valves"></div>
</div>

<div class="section">
<h3>🌱 Borewells</h3>
<div id="borewells"></div>
</div>

<div class="section">
<h3>💧 Wells</h3>
<div id="wells"></div>
</div>

<script>

let uid = null;

/* ================= AUTH ================= */
firebase.auth().onAuthStateChanged(async user => {

if(!user){
window.location.href="index.html";
return;
}

uid = user.uid;

document.getElementById("userInfo").innerText =
"Logged in: " + (user.email || "");

loadAll();

});

/* ================= LOAD ================= */
async function loadAll(){

let userSnap = await firebase.database().ref("users/"+uid).once("value");
let user = userSnap.val() || {};

let devSnap = await firebase.database().ref("devices/"+uid).once("value");
let dev = devSnap.val() || {};

renderValves(dev.valves || {}, user.valveCount || 0);
renderBorewells(dev.borewells || {}, user.borewellCount || 0);
renderWells(dev.wells || {}, user.wellCount || 0);

}

/* ================= WARNING ================= */
function showWarning(msg){
let box = document.getElementById("warning");
box.innerText = msg;
box.style.display = "block";

setTimeout(()=>{
box.style.display = "none";
},3000);
}

/* ================= CHECK VALVES ================= */
async function isValveOn(){

let snap = await firebase.database()
.ref("devices/"+uid+"/valves")
.once("value");

let valves = snap.val() || {};

for(let k in valves){
if(valves[k] && valves[k].status === 1){
return true;
}
}

return false;
}

/* ================= VALVES ================= */
function renderValves(valves,count){

let html="";

for(let i=1;i<=count;i++){

let k="v"+i;
let s=valves[k]?.status || 0;

html += `
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleValve('${k}',${s})">

${s?'ON':'OFF'}

</button>
</div>`;
}

document.getElementById("valves").innerHTML = html;
}

function toggleValve(key,state){

firebase.database()
.ref("devices/"+uid+"/valves/"+key)
.set({status: state?0:1});
}

/* ================= BOREWELL ================= */
function renderBorewells(bws,count){

let html="";

for(let i=1;i<=count;i++){

let k="b"+i;
let s=bws[k]?.status || 0;

html += `
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleBorewell('${k}',${s})">

${s?'ON':'OFF'}

</button>
</div>`;
}

document.getElementById("borewells").innerHTML = html;
}

async function toggleBorewell(key,state){

// 🔥 IF TURNING ON → CHECK VALVES
if(!state){

let ok = await isValveOn();

if(!ok){
showWarning("⚠ Cannot start Borewell. No Valve is ON!");
return;
}
}

firebase.database()
.ref("devices/"+uid+"/borewells/"+key)
.set({status: state?0:1});
}

/* ================= WELLS ================= */
function renderWells(wells,count){

let html="";

for(let i=1;i<=count;i++){

let k="w"+i;
let s=wells[k]?.status || 0;

html += `
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleWell('${k}',${s})">

${s?'ON':'OFF'}

</button>
</div>`;
}

document.getElementById("wells").innerHTML = html;
}

async function toggleWell(key,state){

if(!state){

let ok = await isValveOn();

if(!ok){
showWarning("⚠ Cannot start Pump. No Valve is ON!");
return;
}
}

firebase.database()
.ref("devices/"+uid+"/wells/"+key)
.set({status: state?0:1});
}

</script>

</body>
</html>
