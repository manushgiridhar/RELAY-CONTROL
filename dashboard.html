<!DOCTYPE html>
<html>

<head>

<title>Relay Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#111827;
padding:40px;
border-radius:20px;
width:400px;
color:white;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
margin-bottom:10px;
}

.user{
margin-bottom:20px;
color:#60a5fa;
}

.status{
background:#1f2937;
padding:15px;
border-radius:12px;
margin:20px 0;
font-size:18px;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
}

button{
border:none;
padding:15px 25px;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

.on{
background:#22c55e;
color:white;
}

.off{
background:#ef4444;
color:white;
}

.logout{
margin-top:20px;
width:100%;
background:#374151;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Relay Control Panel</h1>

<div id="userName" class="user"></div>

<div id="status" class="status">
Relay OFF
</div>

<div class="buttons">

<button
class="on"
onclick="relayOn()">
ON
</button>

<button
class="off"
onclick="relayOff()">
OFF
</button>

</div>

<button
class="logout"
onclick="logout()">
Logout
</button>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location.href="index.html";
return;

}

document.getElementById("userName").innerText =
"Welcome " +
(user.displayName || user.email);

});


firebase.database().ref("relay")
.on("value",(snapshot)=>{

if(snapshot.val()==1){

document.getElementById("status").innerText =
"Relay ON";

}
else{

document.getElementById("status").innerText =
"Relay OFF";

}

});


function relayOn(){

firebase.database()
.ref("relay")
.set(1);

}


function relayOff(){

firebase.database()
.ref("relay")
.set(0);

}


function logout(){

firebase.auth()
.signOut()
.then(()=>{

window.location.href="index.html";

});

}

</script>

</body>

</html>
