<!DOCTYPE html>
<html>
<head>

<title>IoT Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:20px;
}

h2{margin-bottom:10px;}

.section{
margin-top:20px;
padding:15px;
background:#1e1e1e;
border-radius:10px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:8px 0;
background:#2a2a2a;
border-radius:8px;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.on{background:#16a34a;color:#fff;}
.off{background:#dc2626;color:#fff;}

</style>

</head>

<body>

<h2>IoT Smart Dashboard</h2>

<div id="userInfo">Loading...</div>

<div class="section">
<h3>Valves</h3>
<div id="valves"></div>
</div>

<div class="section">
<h3>Borewells</h3>
<div id="borewells"></div>
</div>

<div class="section">
<h3>Wells</h3>
<div id="wells"></div>
</div>

<script>

let uid = null;

/* ================= AUTH ================= */
firebase.auth().onAuthStateChanged(async user => {

if(!user){
window.location.href="index.html";
return;
}

uid = user.uid;

document.getElementById("userInfo").innerText =
"Logged in: " + (user.email || "");

loadData();

});

/* ================= LOAD DATA ================= */
async function loadData(){

let userSnap = await firebase.database().ref("users/"+uid).once("value");
let user = userSnap.val() || {};

let devSnap = await firebase.database().ref("devices/"+uid).once("value");
let dev = devSnap.val() || {};

renderValves(dev.valves || {}, user.valveCount || 0);
renderBorewells(dev.borewells || {}, user.borewellCount || 0);
renderWells(dev.wells || {}, user.wellCount || 0);

}

/* ================= VALVES ================= */
function renderValves(valves,count){

let html="";

for(let i=1;i<=count;i++){

let k="v"+i;
let s=valves[k]?.status || 0;

html+=`
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleValve('${k}',${s})">

${s?'ON':'OFF'}

</button>

</div>`;
}

document.getElementById("valves").innerHTML = html;
}

/* ================= BOREWELLS ================= */
function renderBorewells(bws,count){

let html="";

for(let i=1;i<=count;i++){

let k="b"+i;
let s=bws[k]?.status || 0;

html+=`
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleBorewell('${k}',${s})">

${s?'ON':'OFF'}

</button>

</div>`;
}

document.getElementById("borewells").innerHTML = html;
}

/* ================= WELLS ================= */
function renderWells(wells,count){

let html="";

for(let i=1;i<=count;i++){

let k="w"+i;
let s=wells[k]?.status || 0;

html+=`
<div class="card">
<div>${k.toUpperCase()}</div>

<button class="${s?'on':'off'}"
onclick="toggleWell('${k}',${s})">

${s?'ON':'OFF'}

</button>

</div>`;
}

document.getElementById("wells").innerHTML = html;
}

/* ================= VALVE TOGGLE ================= */
function toggleValve(k,s){

firebase.database()
.ref("devices/"+uid+"/valves/"+k)
.set({status: s?0:1});
}

/* ================= CHECK VALVES ================= */
async function isAnyValveOn(){

let snap =
await firebase.database()
.ref("devices/"+uid+"/valves")
.once("value");

let valves = snap.val() || {};

for(let v in valves){
if(valves[v] && valves[v].status === 1){
return true;
}
}

return false;
}

/* ================= BOREWELL CONTROL ================= */
async function toggleBorewell(k,state){

// if trying to TURN ON
if(!state){

let ok = await isAnyValveOn();

if(!ok){
alert("⚠ Cannot start Borewell. No valve is ON.");
return;
}
}

firebase.database()
.ref("devices/"+uid+"/borewells/"+k)
.set({status: state?0:1});
}

/* ================= WELL CONTROL ================= */
async function toggleWell(k,state){

if(!state){

let ok = await isAnyValveOn();

if(!ok){
alert("⚠ Cannot start Well Pump. No valve is ON.");
return;
}
}

firebase.database()
.ref("devices/"+uid+"/wells/"+k)
.set({status: state?0:1});
}

</script>

</body>
</html>
