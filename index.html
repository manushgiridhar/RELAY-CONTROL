<!DOCTYPE html>
<html>

<head>

<title>ESP32 Relay Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.login{
background:#2563eb;
color:white;
}

.google{
background:#ffffff;
border:1px solid #ddd;
}

.facebook{
background:#1877f2;
color:white;
}

.github{
background:#24292e;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>ESP32 Relay Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
class="login"
onclick="login()">
Login
</button>

<button
class="google"
onclick="googleLogin()">
Continue with Google
</button>

<button
class="facebook"
onclick="facebookLogin()">
Continue with Facebook
</button>

<button
class="github"
onclick="githubLogin()">
Continue with GitHub
</button>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{

if(user){

window.location.href="dashboard.html";

}

});

</script>

</body>

</html>
