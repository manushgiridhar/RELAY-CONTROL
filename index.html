<!DOCTYPE html>
<html>
<head>

<title>IoT Control System Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<style>

/* ================= BASE THEME ================= */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;

background:
radial-gradient(circle at top left,#f5f1e6 10%,transparent 40%),
radial-gradient(circle at bottom right,#111 10%,transparent 40%),
linear-gradient(135deg,#f5f1e6,#111);

color:#111;
}

/* ================= CARD ================= */

.login-box{

width:420px;
padding:32px;

border-radius:16px;

background:rgba(255,255,255,0.75);

backdrop-filter:blur(14px);

border:1px solid rgba(0,0,0,0.15);

box-shadow:0 20px 50px rgba(0,0,0,0.25);

text-align:center;

}

/* ================= TITLE ================= */

h2{
margin-bottom:20px;
color:#111;
letter-spacing:1px;
}

/* ================= INPUTS ================= */

input{

width:100%;

padding:12px;

margin:8px 0;

border-radius:10px;

border:1px solid #d6cbb5;

outline:none;

background:#f5f1e6;

color:#111;

font-size:14px;

transition:0.2s;

}

input:focus{

border:1px solid #111;

background:#fff;

}

/* ================= BUTTON ================= */

.btn{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:600;

transition:0.2s;

}

/* LOGIN */

.email{

background:#111;

color:#f5f1e6;

}

.email:hover{

background:#000;

}

/* REGISTER */

.register{

background:#16a34a;

color:white;

}

.register:hover{

opacity:0.9;

}

/* SOCIAL */

.google,
.github,
.facebook{

display:flex;

align-items:center;

justify-content:center;

gap:10px;

}

/* GOOGLE */

.google{

background:#f5f1e6;

color:#111;

border:1px solid #d6cbb5;

}

/* GITHUB */

.github{

background:#111;

color:#fff;

}

/* FACEBOOK */

.facebook{

background:#2a2a2a;

color:#fff;

}

/* ICON */

.icon{

width:18px;

height:18px;

}

/* FOOTER */

.tag{

margin-top:14px;

font-size:12px;

opacity:0.7;

}

</style>

</head>

<body>

<div class="login-box">

<h2>IoT Control System</h2>

<input
id="email"
type="email"
placeholder="Email Address">

<input
id="password"
type="password"
placeholder="Password">

<button
class="btn email"
onclick="login()">

ACCESS SYSTEM

</button>

<button
class="btn register"
onclick="register()">

CREATE ACCOUNT

</button>

<!-- GOOGLE -->

<button
class="btn google"
onclick="googleLogin()">

<img
class="icon"
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

Continue with Google

</button>

<!-- GITHUB -->

<button
class="btn github"
onclick="githubLogin()">

<img
class="icon"
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">

Continue with GitHub

</button>

<!-- FACEBOOK -->

<button
class="btn facebook"
onclick="facebookLogin()">

<img
class="icon"
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">

Continue with Facebook

</button>

<div class="tag">
Secure Node Authentication Layer
</div>

</div>

<script>

/* ================= AUTO LOGIN ================= */

firebase.auth().onAuthStateChanged(user=>{

if(user){

window.location.href =
"home.html";

}

});

</script>

</body>
</html>
