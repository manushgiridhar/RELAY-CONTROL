<!DOCTYPE html>
<html>
<head>

<title>IoT Control Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:
radial-gradient(circle at top,#1e3a8a,#0f172a);
color:white;
}

/* LOGIN CARD */
.login-box{
width:380px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h2{
margin-bottom:20px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
}

input:focus{
background:rgba(255,255,255,0.15);
}

/* BUTTON BASE */
.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(255,255,255,0.1);
}

/* EMAIL */
.email{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:black;
}

/* GOOGLE */
.google{
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* GITHUB */
.github{
background:#111827;
color:white;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* FACEBOOK */
.facebook{
background:#1877f2;
color:white;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* ICON */
.icon{
width:18px;
height:18px;
}

/* LOADING STATE (NEW ADDITION) */
#loading{
margin-top:10px;
font-size:13px;
opacity:0.7;
display:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>IoT Control System</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn email" onclick="login()">
Login
</button>

<!-- GOOGLE -->
<button class="btn google" onclick="googleLogin()">
<img class="icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
Continue with Google
</button>

<!-- GITHUB -->
<button class="btn github" onclick="githubLogin()">
<img class="icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
Continue with GitHub
</button>

<!-- FACEBOOK -->
<button class="btn facebook" onclick="facebookLogin()">
<img class="icon" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">
Continue with Facebook
</button>

<div id="loading">Authenticating system access...</div>

</div>

<script>

/* ================= SYSTEM GATE (PREVENT FLASH) ================= */
document.getElementById("loading").style.display = "block";

/* AUTH STATE HANDLER */
firebase.auth().onAuthStateChanged(user=>{
if(user){
window.location.href="home.html";
}else{
document.getElementById("loading").style.display = "none";
}
});

</script>

</body>
</html>
