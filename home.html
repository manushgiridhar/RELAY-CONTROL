<!DOCTYPE html>
<html>
<head>
<title>Control Center</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CONTROL CENTER</div>

<div class="nav" onclick="openPage('master')">Master Unit</div>
<div class="nav" onclick="openPage('borewell')">Borewell Unit</div>
<div class="nav" onclick="openPage('valve')">Valve Unit</div>
<div class="nav" onclick="openPage('well')">Well Unit</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main">

<h2>System Status</h2>

<div class="grid">

<div class="card">
<h3>Master Unit</h3>
<p id="mStatus">Loading...</p>
</div>

<div class="card">
<h3>Borewell Unit</h3>
<p id="bStatus">Loading...</p>
</div>

<div class="card">
<h3>Valve Unit</h3>
<p id="vStatus">Loading...</p>
</div>

<div class="card">
<h3>Well Unit</h3>
<p id="wStatus">Loading...</p>
</div>

</div>

</div>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{
if(!user) window.location.href="index.html";
});

function openPage(p){
window.location.href=p+".html";
}

function logout(){
firebase.auth().signOut().then(()=>location.href="index.html");
}

firebase.database().ref("nodes").on("value",snap=>{
let d=snap.val();
if(!d) return;

document.getElementById("mStatus").innerText =
d.master.esp32 + " | " + d.master.lora;

document.getElementById("bStatus").innerText =
d.borewell.esp32 + " | Soil:" + d.borewell.soil + "%";

document.getElementById("vStatus").innerText =
d.valve.position;

document.getElementById("wStatus").innerText =
"Water:" + d.well.waterLevel + "%";
});

</script>

</body>
</html>
