<!DOCTYPE html>
<html>
<head>
<title>IoT Control Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5f1e8;
color:#2f2f2f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* MAIN CONTAINER */
.panel{
width:420px;
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
h2{
margin-bottom:20px;
color:#2f2f2f;
}

/* STATUS CARDS */
.card{
background:#faf7f0;
border:1px solid #e7e0d5;
padding:15px;
border-radius:12px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LABEL */
.label{
font-size:14px;
color:#444;
}

/* STATUS DOT */
.dot{
width:10px;
height:10px;
border-radius:50%;
background:#b5b5b5;
}

/* ACTIVE */
.green{
background:#2e7d32 !important;
}

/* BUTTONS */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

/* RELAY BUTTONS */
.on{
background:#2e7d32;
color:white;
}

.off{
background:#c62828;
color:white;
}

/* LOGOUT */
.logout{
background:#8d8d8d;
color:white;
}

/* STATUS TEXT */
.small{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="panel">

<h2>IoT System Dashboard</h2>

<div class="small" id="user">Loading user...</div>

<!-- FIREBASE -->
<div class="card">
<div class="label">Firebase Connection</div>
<div class="dot green" id="firebaseDot"></div>
</div>

<!-- ESP32 -->
<div class="card">
<div class="label">ESP32 Device</div>
<div class="dot" id="espDot"></div>
</div>

<!-- LORA -->
<div class="card">
<div class="label">LoRa Module</div>
<div class="dot" id="loraDot"></div>
</div>

<!-- RELAY STATUS -->
<div class="card">
<div class="label">Relay State</div>
<div id="relayState">UNKNOWN</div>
</div>

<button class="on" onclick="relayOn()">TURN ON</button>
<button class="off" onclick="relayOff()">TURN OFF</button>

<button class="logout" onclick="logout()">LOGOUT</button>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
return;
}
document.getElementById("user").innerText =
"Logged in as: " + (user.displayName || user.email);
});

// FIREBASE ALWAYS ONLINE (if page loads)
document.getElementById("firebaseDot").classList.add("green");

// ESP + LORA STATUS LISTENER
firebase.database().ref("system").on("value",snap=>{

let data = snap.val();

if(!data){
document.getElementById("espDot").classList.remove("green");
document.getElementById("loraDot").classList.remove("green");
return;
}

// ESP STATUS
if(data.esp32 === "online"){
document.getElementById("espDot").classList.add("green");
}else{
document.getElementById("espDot").classList.remove("green");
}

// LORA STATUS
if(data.lora === "ready"){
document.getElementById("loraDot").classList.add("green");
}else{
document.getElementById("loraDot").classList.remove("green");
}

});

// RELAY LISTENER
firebase.database().ref("relay").on("value",snap=>{
document.getElementById("relayState").innerText =
snap.val() == 1 ? "ON" : "OFF";
});

// RELAY CONTROL
function relayOn(){
firebase.database().ref("relay").set(1);
}

function relayOff(){
firebase.database().ref("relay").set(0);
}

// LOGOUT
function logout(){
firebase.auth().signOut()
.then(()=>window.location.href="index.html");
}

</script>

</body>
</html>
