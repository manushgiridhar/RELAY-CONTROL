<!DOCTYPE html>
<html>
<head>

<title>IoT Control Center</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>

<link rel="stylesheet" href="style.css">

<style>

.userInfo{
margin-bottom:20px;
font-size:14px;
opacity:0.8;
}

.count{
font-size:28px;
font-weight:700;
margin-top:10px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">CONTROL CENTER</div>

<div id="adminBtn" class="nav hidden" onclick="openAdmin()">
⚙️ Admin Panel
</div>

<div class="nav" onclick="openPage('borewell')">🌱 Borewells</div>
<div class="nav" onclick="openPage('valve')">🚰 Valves</div>
<div class="nav" onclick="openPage('well')">💧 Wells</div>
<div class="nav" onclick="logout()">🚪 Logout</div>

</div>

<div class="main">

<h2>Dashboard</h2>

<div class="userInfo">

<div id="userEmail">Loading...</div>
<div id="userRole">Loading...</div>

</div>

<div class="grid">

<div class="card">
<h3>🌱 Borewells</h3>
<div id="borewellCount" class="count">0</div>
</div>

<div class="card">
<h3>🚰 Valves</h3>
<div id="valveCount" class="count">0</div>
</div>

<div class="card">
<h3>💧 Wells</h3>
<div id="wellCount" class="count">0</div>
</div>

</div>

<br>

<div class="card">
<h3>Account Summary</h3>
<br>
<p>This dashboard is generated automatically from your device allocation.</p>
</div>

</div>

</div>

<script>

let currentUserUid = null;

/* ================= AUTH ================= */

firebase.auth().onAuthStateChanged(async (user) => {

if (!user) {
window.location.href = "index.html";
return;
}

currentUserUid = user.uid;

document.getElementById("userEmail").innerText =
"Email : " + (user.email || "No Email");

await loadUserData(user);

});

/* ================= LOAD USER ================= */

async function loadUserData(user) {

let ref = firebase.database().ref("users/" + user.uid);
let snap = await ref.once("value");
let userData = snap.val();

/* 🔥 FIX: auto-create missing profile */
if (!userData) {

console.log("Auto-creating missing user profile...");

await ref.set({
email: user.email || "",
role: "user",
borewellCount: 0,
valveCount: 0,
wellCount: 0,
createdAt: Date.now()
});

userData = {
role: "user",
borewellCount: 0,
valveCount: 0,
wellCount: 0
};
}

/* ================= UI ================= */

document.getElementById("userRole").innerText =
"Role : " + userData.role;

/* ADMIN BUTTON */
if (userData.role === "admin") {
document.getElementById("adminBtn").classList.remove("hidden");
}

/* COUNTS */
document.getElementById("borewellCount").innerText =
userData.borewellCount || 0;

document.getElementById("valveCount").innerText =
userData.valveCount || 0;

document.getElementById("wellCount").innerText =
userData.wellCount || 0;

}

/* ================= NAVIGATION ================= */

function openPage(page) {
window.location.href = page + ".html";
}

function openAdmin() {
window.location.href = "admin.html";
}

/* ================= LOGOUT ================= */

function logout() {
firebase.auth().signOut().then(() => {
window.location.href = "index.html";
});
}

</script>

</body>
</html>
