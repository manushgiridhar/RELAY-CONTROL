<!DOCTYPE html>
<html>
<head>
<title>IoT Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase-config.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">⚡ IoT CONTROL</div>

<div class="nav" onclick="openRelay()">🔌 Relay Control</div>
<div class="nav" onclick="openLora()">📡 LoRa Terminal</div>
<div class="nav" onclick="logout()">🚪 Logout</div>

</div>

<!-- MAIN -->
<div class="main">

<h2>System Overview</h2>

<div class="grid">

<div class="card">
<h3><span class="dot green"></span>System Online</h3>
<p>Firebase connected</p>
</div>

<div class="card">
<h3><span class="dot blue"></span>Devices</h3>
<p>ESP32 nodes ready</p>
</div>

<div class="card">
<h3><span class="dot red"></span>Security</h3>
<p>Auth enabled</p>
</div>

</div>

</div>

</div>

<script>

firebase.auth().onAuthStateChanged(user=>{
if(!user){
window.location.href="index.html";
}
});

function openRelay(){
window.location.href="relay.html";
}

function openLora(){
window.location.href="lora.html";
}

function logout(){
firebase.auth().signOut().then(()=>{
window.location.href="index.html";
});
}

</script>

</body>
</html>
