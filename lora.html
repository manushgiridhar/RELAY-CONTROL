<!DOCTYPE html>
<html>
<head>
<title>LoRa Terminal</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase-config.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">📡 LORA SYSTEM</div>
<div class="nav" onclick="back()">⬅ Back</div>
</div>

<div class="main">

<h2>Message Terminal</h2>

<div class="card">

<input id="msg" placeholder="Send message">

<button onclick="send()">Send</button>

<div class="chat" id="chat"></div>

</div>

</div>

</div>

<script>

function send(){
firebase.database().ref("lora").set({
text:document.getElementById("msg").value,
time:Date.now()
});
}

firebase.database().ref("lora").on("value",snap=>{
let d=snap.val();
if(d){
document.getElementById("chat").innerHTML +=
"<div class='msg'>➡ "+d.text+"</div>";
}
});

function back(){
window.location.href="home.html";
}

</script>

</body>
</html>
